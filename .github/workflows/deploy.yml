name: Build and auto-deploy to cPanel
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: deploy-littlegraduates
  cancel-in-progress: false
jobs:
  build:
    name: Build static site + publish deploy branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: cp .cpanel.yml dist/.cpanel.yml
      - name: Stamp build id (commit SHA) so the deploy job can verify the live docroot
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - name: Publish dist to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: build
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST:  ${{ secrets.CPANEL_HOST }}
      CPANEL_USER:  ${{ secrets.CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT:    /home/${{ secrets.CPANEL_USER }}/repositories/lgsite
    steps:
      - name: Normalise CPANEL_HOST
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"
      - name: Pull + deploy + verify live commit (self-heals the cPanel/GitHub ref race)
        env:
          EXPECT: ${{ github.sha }}
        run: |
          set -u
          AUTH="Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}"
          BASE="https://${CPANEL_HOST_CLEAN}:2083/execute"

          pull() {
            curl -sS --fail-with-body --connect-timeout 15 --max-time 90 -X POST \
              "${BASE}/VersionControl/update" -H "${AUTH}" \
              --data-urlencode "repository_root=${REPO_ROOT}" \
              --data-urlencode "branch=deploy" > /tmp/pull.json \
              && jq -e '.status == 1' /tmp/pull.json > /dev/null
          }
          deploy() {
            curl -sS --fail-with-body --connect-timeout 15 --max-time 120 -X POST \
              "${BASE}/VersionControlDeployment/create" -H "${AUTH}" \
              --data-urlencode "repository_root=${REPO_ROOT}" > /tmp/deploy.json \
              && jq -e '.status == 1' /tmp/deploy.json > /dev/null
          }
          live_sha() {
            curl -sS --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 4 --retry-all-errors \
              "https://thelittlegraduates.in/build-id.txt?_=$(date +%s%N)" 2>/dev/null | tr -d '[:space:]'
          }

          for attempt in 1 2 3 4 5 6; do
            echo "::group::Deploy attempt ${attempt}/6"
            pull   || { echo "VersionControl/update failed:";        cat /tmp/pull.json   2>/dev/null; }
            deploy || { echo "VersionControlDeployment/create failed:"; cat /tmp/deploy.json 2>/dev/null; }
            sleep 10
            GOT="$(live_sha)"
            echo "expected=${EXPECT}  live=${GOT:-<none>}"
            echo "::endgroup::"
            if [ "${GOT}" = "${EXPECT}" ]; then
              echo "::notice::Live docroot is serving ${EXPECT} (attempt ${attempt})."
              exit 0
            fi
            echo "::warning::Live build-id != this commit (cPanel pulled a stale ref). Retrying…"
            sleep 12
          done
          echo "::error::Live site never reached commit ${EXPECT} after 6 attempts."
          exit 1
