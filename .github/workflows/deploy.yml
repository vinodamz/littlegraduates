name: Build and auto-deploy to cPanel
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: deploy-littlegraduates
  cancel-in-progress: false
jobs:
  build:
    name: Build static site + publish deploy branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: cp .cpanel.yml dist/.cpanel.yml
      - name: Publish dist to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          force_orphan: true

  deploy:
    name: Trigger cPanel git-pull and deploy
    needs: build
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST:  ${{ secrets.CPANEL_HOST }}
      CPANEL_USER:  ${{ secrets.CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      REPO_ROOT:    /home/${{ secrets.CPANEL_USER }}/repositories/littlegraduates
    steps:
      - name: Normalise CPANEL_HOST
        run: |
          HOST=$(printf '%s' "${CPANEL_HOST}" | sed -E 's#^https?://##; s#/+$##')
          echo "::add-mask::${HOST}"
          echo "CPANEL_HOST_CLEAN=${HOST}" >> "$GITHUB_ENV"
      - name: 1/3 — cPanel fetch + reset to deploy branch
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" \
            --data-urlencode "branch=deploy" | tee /tmp/pull.json
          jq -e '.status == 1' /tmp/pull.json > /dev/null || (cat /tmp/pull.json; exit 1)
      - name: 2/3 — cPanel run .cpanel.yml (rsync into docroot)
        run: |
          set -e
          curl -sS --fail-with-body -X POST \
            "https://${CPANEL_HOST_CLEAN}:2083/execute/VersionControlDeployment/create" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "repository_root=${REPO_ROOT}" | tee /tmp/deploy.json
          jq -e '.status == 1' /tmp/deploy.json > /dev/null || (cat /tmp/deploy.json; exit 1)
      - name: 3/3 — Self-test the live URL
        run: |
          set +e
          sleep 8
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 \
            --retry 5 --retry-delay 6 --retry-all-errors "https://thelittlegraduates.in/?_=$(date +%s)")
          echo "GET / → HTTP $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || { echo "::error::Live URL returned $STATUS"; exit 1; }
          echo "::notice::new.thelittlegraduates.in is live."
